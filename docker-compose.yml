services:
  postgres:
    image: postgres:16
    container_name: solvia-postgres
    restart: always
    environment:
      POSTGRES_DB: solvia
      POSTGRES_USER: solvia_user
      POSTGRES_PASSWORD: argentine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: solvia-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@solvia.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres_data: